# Model-free CI (design principle: subscription-first — no API-billed model calls in CI).
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-selftests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags: selftests (derive-release) diff against the latest release tag

      - name: shellcheck
        run: |
          sudo apt-get update -q && sudo apt-get install -y shellcheck jq
          # SC1091: sourced files resolved at runtime
          # SC2015: `A && B || C` guard style is the tree's deliberate idiom (57 sites)
          # SC2181: selftests check `$?` after run_cli-style wrappers deliberately (the
          #         command under test is a variable invocation, not inlineable)
          find . -name '*.sh' -type f -print0 | xargs -0 shellcheck -e SC1091,SC2015,SC2181

      - name: validate JSON (manifests, schema, fixtures)
        run: find . -name '*.json' -type f -print0 | xargs -0 -n1 jq empty

      # Static analysis of the workflow files themselves: invalid `if:` expressions, unknown
      # contexts, bad `uses:` refs, plus shellcheck over `run:` blocks. Pinned image, no
      # curl|bash. NOTE the chicken-and-egg: a YAML *syntax* error in this very file means
      # GitHub refuses to run it, so this step never fires for its own breakage — that floor
      # is held locally by scripts/check-workflows-selftest.sh, which is the gate that must
      # catch it before the push.
      - name: actionlint (workflow static analysis)
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

      - name: run all selftests
        run: |
          fails=0
          while IFS= read -r -d '' t; do
            echo "── $t"
            bash "$t" || fails=$((fails+1))
          done < <(find . -name '*-selftest.sh' -type f -print0)
          exit "$fails"

      - name: namespace direction check (docs/namespaces.md rule 3)
        run: |
          TOOLKITS="plugins/review-toolkit plugins/intake-toolkit plugins/design-toolkit plugins/audit-toolkit"
          # (a) no dev-pipeline: namespace token anywhere in the four toolkits
          if grep -rn 'dev-pipeline:' $TOOLKITS --include='*.md' --include='*.mjs' --include='*.sh' --include='*.json' 2>/dev/null; then
            echo "::error::rule 3(a): a toolkit references the dev-pipeline: namespace"; exit 1
          fi
          # (b) no hard dev-pipeline/ PATH reference in toolkit CONTENT (skills + agents).
          #     Workflows are invoked by bare filename (D-15). Validator/eval tools that resolve
          #     the sibling dev-pipeline plugin are exempt — they live under scripts/ and evals/,
          #     which are excluded here (grep the toolkit roots directly so paths are never empty).
          if grep -rnE 'skills/run/|dev-pipeline/(workflows|stages|state-schema|doc-update)|\.\./dev-pipeline/' \
               $TOOLKITS --include='*.md' --include='*.mjs' --exclude-dir=scripts --exclude-dir=evals 2>/dev/null; then
            echo "::error::rule 3(b): toolkit content hard-paths into dev-pipeline (invoke workflows by bare filename; reference artifacts by name)"; exit 1
          fi

  # Release-time derivation (#119): feature PRs must NOT write the release-owned files —
  # plugin.json version fields and CHANGELOG.md are computed on the release PR by
  # scripts/derive-release.sh. These two gates are pull_request-only and skip the release
  # branch (release/next), which is the one legitimate writer.
  # The release-branch exemption is keyed on branch name AND head repo: `head_ref` alone is
  # chosen by the PR author (a fork can name its branch release/next), so name-only routing
  # would let any contributor skip both guards. A fork PR is ALWAYS a feature PR here.
  pr-gates:
    if: >-
      github.event_name == 'pull_request' &&
      !(github.head_ref == 'release/next' &&
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # BASE_REF rides in the environment, never spliced into the run body: git ref names
      # permit $, backticks and ; so `${{ }}` interpolation into a shell line is injectable.
      - name: frozen files guard (plugin.json versions + CHANGELOG are release-owned)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: bash scripts/check-frozen-files.sh "origin/$BASE_REF"

      - name: "changelog trailer guard (plugins/** PRs carry a Changelog: trailer)"
        env:
          BASE_REF: ${{ github.base_ref }}
        run: bash scripts/check-changelog-trailer.sh "origin/$BASE_REF"

  # Gates that run ONLY on the release PR: the old version-bump discipline (every
  # content-changed plugin carries its derived bump — same script, new call site) and the
  # configVersion migration-doc gate (a schema-breaking change ships its upgrade doc).
  release-pr-gates:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'release/next' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: bump discipline (changed plugin ⇒ derived bump applied)
        run: bash scripts/check-plugin-version-bumps.sh

      - name: configVersion migration-doc gate
        run: bash scripts/check-configversion-migration-doc.sh

  # macOS ships /bin/bash 3.2 and every shipped script claims 3.2 compat — two real
  # statectl bugs (generator mapfile, mark-failed brace-default expansion) lived
  # undetected while the selftests only ever ran under bash 4+. GitHub macOS runners
  # put Homebrew bash 5 first on PATH, so shim PATH to force `#!/usr/bin/env bash`
  # back to the stock 3.2 binary. (Ported from the acme vendored-era workflow,
  # widened from statectl-only to the full selftest set.)
  selftests-bash32:
    name: selftests (macos, bash 3.2)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: run all selftests under stock bash 3.2
        env:
          # Parallel-write stress cases are documented as too flaky for CI.
          SKIP_STRESS: '1'
        run: |
          mkdir -p /tmp/bash32
          ln -sf /bin/bash /tmp/bash32/bash
          export PATH="/tmp/bash32:$PATH"
          bash --version | head -1
          fails=0
          while IFS= read -r -d '' t; do
            echo "── $t"
            bash "$t" || fails=$((fails+1))
          done < <(find . -name '*-selftest.sh' -type f -print0)
          exit "$fails"
